<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <title>ATScore — Payment Successful</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=JetBrains+Mono:wght@500&family=Nunito+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0b0f; --surface: #111318; --border: rgba(255,255,255,0.08);
      --text: #edeef5; --text2: #8892aa; --text3: #484f68;
      --accent: #6c63ff; --green: #22c55e; --green-dim: rgba(34,197,94,0.12);
      --serif: 'DM Serif Display', serif; --mono: 'JetBrains Mono', monospace;
      --sans: 'Nunito Sans', sans-serif;
    }
    body {
      font-family: var(--sans); background: var(--bg); color: var(--text);
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; padding: 40px 24px;
    }
    body::before {
      content: ''; position: fixed; inset: 0;
      background-image: linear-gradient(rgba(108,99,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(108,99,255,0.025) 1px, transparent 1px);
      background-size: 48px 48px; pointer-events: none; z-index: 0;
    }
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 20px; padding: 52px 48px; text-align: center;
      max-width: 480px; width: 100%; position: relative; z-index: 1;
    }
    .card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, var(--green), transparent);
    }
    .check-ring {
      width: 72px; height: 72px; border-radius: 50%;
      background: var(--green-dim); border: 2px solid rgba(34,197,94,0.3);
      display: flex; align-items: center; justify-content: center;
      font-size: 32px; margin: 0 auto 28px;
      animation: pop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }
    @keyframes pop { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    h1 { font-family: var(--serif); font-size: 32px; margin-bottom: 12px; }
    .sub { font-size: 15px; color: var(--text2); line-height: 1.6; margin-bottom: 32px; }
    .token-box {
      background: rgba(34,197,94,0.08); border: 1px solid rgba(34,197,94,0.2);
      border-radius: 10px; padding: 16px 20px; margin-bottom: 28px;
    }
    .token-label { font-size: 11px; color: var(--text3); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 8px; }
    .scans-count { font-family: var(--serif); font-size: 40px; color: var(--green); line-height: 1; }
    .scans-label { font-size: 13px; color: var(--text2); margin-top: 4px; }
    .cta {
      display: block; background: var(--accent); color: #fff;
      border-radius: 10px; padding: 14px 28px;
      font: 700 15px/1 var(--sans); text-decoration: none;
      transition: opacity 0.2s, transform 0.2s;
    }
    .cta:hover { opacity: 0.9; transform: translateY(-1px); }
    .secondary-cta {
      display: block;
      margin-top: 12px;
      color: var(--text2);
      text-decoration: none;
      font-size: 13px;
      font-weight: 600;
    }
    .secondary-cta:hover { color: var(--text); }
    .loading-msg { font-size: 14px; color: var(--text2); }
    .spinner {
      width: 32px; height: 32px; margin: 0 auto 16px;
      border: 3px solid var(--border); border-top-color: var(--accent);
      border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error { color: #ef4444; font-size: 14px; margin-top: 16px; }
  </style>
</head>
<body>
  <div class="card" id="card">
    <div class="spinner" id="spinner"></div>
    <p class="loading-msg">Confirming your payment…</p>
  </div>

  <script>
    const params = new URLSearchParams(location.search);
    const sessionId = params.get('session_id');
    const plan      = params.get('plan');

    async function confirm() {
      if (!sessionId || !plan) {
        showError('Missing payment details. Please contact support.');
        return;
      }
      try {
        const res  = await fetch(`/verify-payment?session_id=${sessionId}&plan=${plan}`);
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Verification failed');

        localStorage.setItem('ats_scans', data.scans_remaining);

        showSuccess(data);
      } catch (err) {
        showError(err.message);
      }
    }

    function showSuccess(data) {
      const planNames = { single: 'Single Scan', starter: 'Starter Pack', pro: 'Pro Plan' };
      document.getElementById('card').innerHTML = `
        <div class="check-ring">✓</div>
        <h1>You're all set!</h1>
        <p class="sub">Payment confirmed. Your scans are ready to use.</p>
        <div class="token-box">
          <div class="token-label">${planNames[data.plan] || data.plan}</div>
          <div class="scans-count">${data.scans_remaining >= 9000 ? 'Unlimited' : data.scans_remaining}</div>
          <div class="scans-label">${data.scans_remaining >= 9000 ? 'scans for 30 days' : `scan${data.scans_remaining === 1 ? '' : 's'} available`}</div>
        </div>
        <a href="/tool/" class="cta">Start Analyzing →</a>
        <a href="/account/" class="secondary-cta">View account access →</a>
      `;
    }

    function showError(msg) {
      document.getElementById('card').innerHTML = `
        <h1>Something went wrong</h1>
        <p class="error">${msg}</p>
        <p style="margin-top:16px;font-size:13px;color:var(--text3)">
          Your payment may have gone through. Please email us with your receipt and we'll sort it out.
        </p>
      `;
    }

    confirm();
  </script>
</body>
</html>
